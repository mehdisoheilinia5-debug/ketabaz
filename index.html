<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کتاب باز | مرکز هنر من</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --border: #333333;
            --input-bg: #252525;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-secondary: #6e6e73;
            --accent: #b8962e;
            --accent-glow: rgba(184, 150, 46, 0.25);
            --border: #d1d1d6;
            --input-bg: #f8f9fa;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeInDown 0.6s ease-out;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 1.8rem;
            color: var(--accent);
            margin: 0;
            text-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 i {
            font-size: 1.6rem;
        }

        .header-center {
            flex: 1;
            max-width: 400px;
            min-width: 200px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .menu-btn:hover {
            background: var(--accent);
            color: #fff;
            transform: rotate(90deg) scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            left: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            width: 220px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dropdown-menu.active {
            display: flex;
        }

        .dropdown-item {
            padding: 14px 18px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            font-size: 0.95rem;
            position: relative;
            border: none;
            background: transparent;
            width: 100%;
            text-align: right;
            font-family: inherit;
        }

        .dropdown-item:hover {
            background: var(--accent-glow);
            color: var(--accent);
            padding-right: 24px;
        }

        .dropdown-item i {
            width: 20px;
            text-align: center;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            padding: 4px 12px 4px 4px;
            border-radius: 50px;
            background: var(--input-bg);
            border: 1px solid transparent;
        }

        .profile-section:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .profile-pic-container {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--accent);
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .profile-pic-container i {
            font-size: 1.2rem;
            color: var(--accent);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .profile-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .profile-role {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Search Box */
        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 42px 10px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-box .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-box .clear-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            background: none;
            border: none;
            font-size: 1rem;
        }

        .search-box .clear-search.visible {
            opacity: 1;
        }

        .search-box .clear-search:hover {
            color: var(--accent);
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .tab-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-bar i {
            color: var(--accent);
        }

        /* Input Section */
        .input-section {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .input-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
        }

        #add-btn {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        #add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        #save-draft-btn {
            background: var(--input-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        #save-draft-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* Notes List */
        .notes-list {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .note-card {
            background: var(--card-bg);
            padding: 20px 24px;
            border-radius: var(--radius);
            border-right: 4px solid var(--accent);
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: cardEntrance 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .note-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .note-card .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 12px;
        }

        .note-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .note-title i {
            color: var(--accent);
        }

        .card-actions {
            display: flex;
            gap: 6px;
            opacity: 0.5;
            transition: var(--transition);
        }

        .note-card:hover .card-actions {
            opacity: 1;
        }

        .action-btn {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .action-btn.delete:hover {
            background: #ff6b6b;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .note-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .tag {
            background: linear-gradient(135deg, var(--accent-glow), transparent);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: var(--transition);
            cursor: default;
        }

        .tag.clickable {
            cursor: pointer;
        }

        .tag.clickable:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 8px;
        }

        .rating-container {
            display: flex;
            gap: 4px;
        }

        .star {
            color: #555;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
        }

        .star.active {
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .star:hover {
            transform: scale(1.3);
            color: #f39c12;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-style: italic;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            color: var(--border);
            display: block;
            transition: transform 0.6s;
        }

        .empty-state:hover i {
            transform: rotate(360deg);
            color: var(--accent);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeInUp 0.5s ease-out;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 32px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 420px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .preview-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--input-bg);
            border: 2px dashed var(--border);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .preview-pic:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.05);
        }

        .preview-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .preview-pic i {
            font-size: 2.5rem;
            color: var(--text-secondary);
        }

        .modal-input {
            margin-bottom: 16px;
            text-align: right;
        }

        .modal-input label {
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .modal-input input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        .modal-input input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-save {
            flex: 1;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        .btn-cancel {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-cancel:hover {
            border-color: var(--text-secondary);
            color: var(--text-main);
            background: var(--input-bg);
        }

        #profile-upload {
            display: none;
        }

        /* Back to main button */
        .back-to-main-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--accent);
            color: #fff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: var(--transition);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.8);
        }

        .back-to-main-btn:hover {
            transform: scale(1.1) translateY(0);
            box-shadow: 0 12px 35px var(--accent-glow);
        }

        body.read-only .back-to-main-btn {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        body.read-only .input-section,
        body.read-only .tabs,
        body.read-only .search-box,
        body.read-only .stats-bar {
            display: none !important;
        }

        body.read-only .note-card {
            border-right: none;
            border: 1px solid var(--border);
            transform: none !important;
        }

        body.read-only .note-card:hover {
            transform: none !important;
            box-shadow: var(--shadow) !important;
        }

        body.read-only .card-actions {
            display: none !important;
        }

        #pdf-container {
            display: none;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--text-main);
            padding: 14px 24px;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast i {
            color: var(--accent);
            font-size: 1.2rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        .fade-out {
            animation: fadeOut 0.3s forwards;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            header {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }

            .header-title h1 {
                font-size: 1.4rem;
                justify-content: center;
            }

            .header-center {
                max-width: 100%;
            }

            .header-right {
                justify-content: center;
            }

            .profile-info {
                display: none;
            }

            .tab-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }

            .form-actions {
                flex-direction: column;
            }

            .note-card {
                padding: 16px;
            }

            .note-title {
                font-size: 1rem;
            }

            .modal-content {
                padding: 24px;
            }

            .back-to-main-btn {
                bottom: 16px;
                left: 16px;
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }

            .toast {
                bottom: 16px;
                right: 16px;
                left: 16px;
                padding: 12px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-title">
                <h1><i class="fas fa-theater-masks"></i> کتاب باز</h1>
            </div>

            <div class="header-center">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="جستجو در عنوان، متن یا تگ‌ها..." oninput="filterItems()">
                    <button class="clear-search" id="clear-search-btn" onclick="clearSearch()">✕</button>
                </div>
            </div>

            <div class="header-right" style="position: relative;">
                <button class="menu-btn" onclick="toggleMenu()" title="منو">
                    <i class="fas fa-ellipsis-v"></i>
                </button>

                <div class="dropdown-menu" id="main-menu">
                    <button class="dropdown-item" onclick="openProfileModal()">
                        <i class="fas fa-user-cog"></i>
                        <span>تنظیمات پروفایل</span>
                    </button>
                    <button class="dropdown-item" onclick="toggleTheme()">
                        <i class="fas fa-moon" id="theme-icon"></i>
                        <span id="theme-text">تغییر تم</span>
                    </button>
                    <button class="dropdown-item" onclick="toggleReadOnly()">
                        <i class="fas fa-eye" id="readonly-icon"></i>
                        <span id="readonly-text">حالت مطالعه</span>
                    </button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" onclick="exportPDF()">
                        <i class="fas fa-file-pdf"></i>
                        <span>دانلود PDF</span>
                    </button>
                </div>

                <div class="profile-section" onclick="openProfileModal()">
                    <div class="profile-pic-container">
                        <img id="profile-img" src="" alt="پروفایل">
                        <i class="fas fa-user" id="profile-icon"></i>
                    </div>
                    <div class="profile-info">
                        <span class="profile-name" id="display-name">کاربر مهمان</span>
                        <span class="profile-role">هنردوست</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('books')">
                <i class="fas fa-book"></i> کتاب
            </button>
            <button class="tab-btn" onclick="switchTab('movies')">
                <i class="fas fa-film"></i> فیلم
            </button>
            <button class="tab-btn" onclick="switchTab('theater')">
                <i class="fas fa-theater-masks"></i> تئاتر
            </button>
        </div>

        <!-- Books Section -->
        <div id="books-section" class="content-section active">
            <div class="stats-bar" id="books-stats">
                <span><i class="fas fa-list"></i> <span id="books-count">0</span> آیتم</span>
                <span><i class="fas fa-star"></i> میانگین: <span id="books-avg">0</span></span>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label for="book-title"><i class="fas fa-book-open"></i> عنوان کتاب</label>
                    <input type="text" id="book-title" placeholder="نام کتاب..." oninput="autoSave('book')">
                </div>
                <div class="input-group">
                    <label for="book-tags"><i class="fas fa-tags"></i> تگ‌ها (با کاما جدا کنید)</label>
                    <input type="text" id="book-tags" placeholder="مثال: رمان, عاشقانه, کلاسیک" oninput="autoSave('book')">
                </div>
                <div class="input-group">
                    <label for="book-desc"><i class="fas fa-pen"></i> یادداشت‌ها</label>
                    <textarea id="book-desc" placeholder="تحلیل و حس خود را بنویسید..." oninput="autoSave('book')"></textarea>
                </div>
                <div class="form-actions">
                    <button id="save-draft-btn" onclick="saveDraft('book')"><i class="fas fa-save"></i> ذخیره پیش‌نویس</button>
                    <button id="add-btn" onclick="addItem('books')"><i class="fas fa-plus"></i> افزودن</button>
                </div>
            </div>

            <div id="books-tags-container" class="tags-container" style="margin: 12px 0; justify-content: center;"></div>
            <div id="books-list" class="notes-list"></div>
        </div>

        <!-- Movies Section -->
        <div id="movies-section" class="content-section">
            <div class="stats-bar" id="movies-stats">
                <span><i class="fas fa-list"></i> <span id="movies-count">0</span> آیتم</span>
                <span><i class="fas fa-star"></i> میانگین: <span id="movies-avg">0</span></span>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label for="movie-title"><i class="fas fa-film"></i> نام فیلم</label>
                    <input type="text" id="movie-title" placeholder="نام فیلم..." oninput="autoSave('movie')">
                </div>
                <div class="input-group">
                    <label for="movie-tags"><i class="fas fa-tags"></i> تگ‌ها (با کاما جدا کنید)</label>
                    <input type="text" id="movie-tags" placeholder="مثال: اکشن, علمی تخیلی" oninput="autoSave('movie')">
                </div>
                <div class="input-group">
                    <label for="movie-desc"><i class="fas fa-pen"></i> نقد و بررسی</label>
                    <textarea id="movie-desc" placeholder="درباره فیلم چه فکری کردید؟" oninput="autoSave('movie')"></textarea>
                </div>
                <div class="form-actions">
                    <button id="save-draft-btn" onclick="saveDraft('movie')"><i class="fas fa-save"></i> ذخیره پیش‌نویس</button>
                    <button id="add-btn" onclick="addItem('movies')"><i class="fas fa-plus"></i> افزودن</button>
                </div>
            </div>

            <div id="movies-tags-container" class="tags-container" style="margin: 12px 0; justify-content: center;"></div>
            <div id="movies-list" class="notes-list"></div>
        </div>

        <!-- Theater Section -->
        <div id="theater-section" class="content-section">
            <div class="stats-bar" id="theater-stats">
                <span><i class="fas fa-list"></i> <span id="theater-count">0</span> آیتم</span>
                <span><i class="fas fa-star"></i> میانگین: <span id="theater-avg">0</span></span>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label for="theater-title"><i class="fas fa-theater-masks"></i> نام نمایش</label>
                    <input type="text" id="theater-title" placeholder="نام نمایش..." oninput="autoSave('theater')">
                </div>
                <div class="input-group">
                    <label for="theater-tags"><i class="fas fa-tags"></i> تگ‌ها (با کاما جدا کنید)</label>
                    <input type="text" id="theater-tags" placeholder="مثال: درام, کمدی" oninput="autoSave('theater')">
                </div>
                <div class="input-group">
                    <label for="theater-desc"><i class="fas fa-pen"></i> یادداشت‌های تئاتر</label>
                    <textarea id="theater-desc" placeholder="بازیگران، کارگردان و حس شما..." oninput="autoSave('theater')"></textarea>
                </div>
                <div class="form-actions">
                    <button id="save-draft-btn" onclick="saveDraft('theater')"><i class="fas fa-save"></i> ذخیره پیش‌نویس</button>
                    <button id="add-btn" onclick="addItem('theater')"><i class="fas fa-plus"></i> افزودن</button>
                </div>
            </div>

            <div id="theater-tags-container" class="tags-container" style="margin: 12px 0; justify-content: center;"></div>
            <div id="theater-list" class="notes-list"></div>
        </div>
    </div>

    <!-- Back to main button -->
    <div class="back-to-main-btn" onclick="toggleReadOnly()" title="بازگشت به حالت اصلی">
        <i class="fas fa-arrow-left"></i>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal-content">
            <div class="modal-header">تنظیمات پروفایل</div>

            <div class="preview-pic" onclick="document.getElementById('profile-upload').click()">
                <img id="modal-img-preview" src="" alt="پیش‌نمایش">
                <i class="fas fa-camera" id="modal-icon-preview"></i>
            </div>
            <input type="file" id="profile-upload" accept="image/*" onchange="previewImage(event)">

            <div class="modal-input">
                <label for="modal-name-input">نام شما</label>
                <input type="text" id="modal-name-input" placeholder="نام خود را وارد کنید...">
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeProfileModal()">انصراف</button>
                <button class="btn-save" onclick="saveProfile()">ذخیره</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">ذخیره شد!</span>
    </div>

    <div id="pdf-container"></div>

    <script>
        // ===== DOM Elements =====
        const body = document.body;
        const profileImg = document.getElementById('profile-img');
        const profileIcon = document.getElementById('profile-icon');
        const displayName = document.getElementById('display-name');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const dropdownMenu = document.getElementById('main-menu');
        const menuBtn = document.querySelector('.menu-btn');
        const modal = document.getElementById('profile-modal');
        const modalImgPreview = document.getElementById('modal-img-preview');
        const modalIconPreview = document.getElementById('modal-icon-preview');
        const modalNameInput = document.getElementById('modal-name-input');
        const profileUpload = document.getElementById('profile-upload');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        const clearSearchBtn = document.getElementById('clear-search-btn');

        let toastTimeout = null;

        // ===== Toast =====
        function showToast(message, icon = 'fa-check-circle') {
            toastMessage.textContent = message;
            toast.querySelector('i').className = `fas ${icon}`;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ===== Theme =====
        function toggleTheme() {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            themeIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            themeText.innerText = isLight ? 'تغییر به حالت شب' : 'تغییر به حالت روز';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            dropdownMenu.classList.remove('active');
            showToast(isLight ? 'تم روشن' : 'تم تاریک', 'fa-palette');
        }

        // ===== Read Only =====
        function toggleReadOnly() {
            body.classList.toggle('read-only');
            const isReadOnly = body.classList.contains('read-only');
            const icon = document.getElementById('readonly-icon');
            const text = document.getElementById('readonly-text');

            if (isReadOnly) {
                icon.className = 'fas fa-eye-slash';
                text.innerText = 'خروج از حالت مطالعه';
                showToast('حالت مطالعه فعال شد', 'fa-eye');
            } else {
                icon.className = 'fas fa-eye';
                text.innerText = 'حالت مطالعه';
                showToast('خروج از حالت مطالعه', 'fa-eye-slash');
            }
            dropdownMenu.classList.remove('active');
        }

        // ===== Menu =====
        function toggleMenu() {
            dropdownMenu.classList.toggle('active');
        }

        document.addEventListener('click', function(event) {
            if (!menuBtn.contains(event.target) && !dropdownMenu.contains(event.target)) {
                dropdownMenu.classList.remove('active');
            }
        });

        // ===== Profile =====
        function openProfileModal() {
            modalNameInput.value = localStorage.getItem('profileName') || '';
            const savedImage = localStorage.getItem('profileImage');
            if (savedImage) {
                modalImgPreview.src = savedImage;
                modalImgPreview.style.display = 'block';
                modalIconPreview.style.display = 'none';
            } else {
                modalImgPreview.style.display = 'none';
                modalIconPreview.style.display = 'block';
            }
            modal.classList.add('active');
            dropdownMenu.classList.remove('active');
        }

        function closeProfileModal() {
            modal.classList.remove('active');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    modalImgPreview.src = e.target.result;
                    modalImgPreview.style.display = 'block';
                    modalIconPreview.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            const name = modalNameInput.value.trim();
            const imageSrc = modalImgPreview.src;
            const hasImage = modalImgPreview.style.display === 'block';

            if (name) {
                localStorage.setItem('profileName', name);
                displayName.innerText = name;
            }

            if (hasImage && imageSrc && !imageSrc.includes('blob')) {
                localStorage.setItem('profileImage', imageSrc);
                profileImg.src = imageSrc;
                profileImg.style.display = 'block';
                profileIcon.style.display = 'none';
            }

            closeProfileModal();
            showToast('پروفایل با موفقیت ذخیره شد!', 'fa-user-check');
        }

        function loadProfile() {
            const name = localStorage.getItem('profileName');
            const image = localStorage.getItem('profileImage');
            if (name) {
                displayName.innerText = name;
                modalNameInput.value = name;
            }
            if (image) {
                profileImg.src = image;
                profileImg.style.display = 'block';
                profileIcon.style.display = 'none';
            }
        }

        // ===== Theme Load =====
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeIcon.className = 'fas fa-sun';
                themeText.innerText = 'تغییر به حالت شب';
            }
        }

        // ===== Auto Save Keys =====
        const autoSaveKeys = {
            'book': 'bookDraft',
            'movie': 'movieDraft',
            'theater': 'theaterDraft'
        };

        function autoSave(type) {
            const title = document.getElementById(type + '-title').value;
            const tags = document.getElementById(type + '-tags').value;
            const desc = document.getElementById(type + '-desc').value;

            localStorage.setItem(autoSaveKeys[type] + '-title', title);
            localStorage.setItem(autoSaveKeys[type] + '-tags', tags);
            localStorage.setItem(autoSaveKeys[type] + '-desc', desc);
        }

        function loadAutoSave() {
            for (const [key, storageKey] of Object.entries(autoSaveKeys)) {
                const savedTitle = localStorage.getItem(storageKey + '-title');
                const savedTags = localStorage.getItem(storageKey + '-tags');
                const savedDesc = localStorage.getItem(storageKey + '-desc');

                if (savedTitle) document.getElementById(key + '-title').value = savedTitle;
                if (savedTags) document.getElementById(key + '-tags').value = savedTags;
                if (savedDesc) document.getElementById(key + '-desc').value = savedDesc;
            }
        }

        function saveDraft(type) {
            autoSave(type);
            showToast('پیش‌نویس ذخیره شد! 📝', 'fa-save');
        }

        // ===== CRUD =====
        function getItems(type) {
            const data = localStorage.getItem(type + 'List');
            return data ? JSON.parse(data) : [];
        }

        function saveItems(type, items) {
            localStorage.setItem(type + 'List', JSON.stringify(items));
        }

        function addItem(type) {
            let titleInput, tagsInput, descInput, listContainer;
            if (type === 'books') {
                titleInput = document.getElementById('book-title');
                tagsInput = document.getElementById('book-tags');
                descInput = document.getElementById('book-desc');
                listContainer = document.getElementById('books-list');
            } else if (type === 'movies') {
                titleInput = document.getElementById('movie-title');
                tagsInput = document.getElementById('movie-tags');
                descInput = document.getElementById('movie-desc');
                listContainer = document.getElementById('movies-list');
            } else if (type === 'theater') {
                titleInput = document.getElementById('theater-title');
                tagsInput = document.getElementById('theater-tags');
                descInput = document.getElementById('theater-desc');
                listContainer = document.getElementById('theater-list');
            }

            const title = titleInput.value.trim();
            const tagsRaw = tagsInput.value.trim();
            const desc = descInput.value.trim();

            if (!title || !desc) {
                showToast('لطفاً عنوان و توضیحات را کامل کنید.', 'fa-exclamation-circle');
                return;
            }

            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];

            const item = {
                id: Date.now(),
                title,
                desc,
                tags,
                rating: 0,
                date: new Date().toLocaleDateString('fa-IR') + ' ' +
                    new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })
            };

            let items = getItems(type);
            items.unshift(item);
            saveItems(type, items);

            // Clear inputs
            titleInput.value = '';
            tagsInput.value = '';
            descInput.value = '';
            localStorage.removeItem(autoSaveKeys[type] + '-title');
            localStorage.removeItem(autoSaveKeys[type] + '-tags');
            localStorage.removeItem(autoSaveKeys[type] + '-desc');

            renderAll(type);
            showToast('با موفقیت اضافه شد! ✨', 'fa-plus-circle');
        }

        function deleteItem(type, id) {
            if (!confirm('آیا از حذف این آیتم مطمئن هستید؟')) return;

            let items = getItems(type);
            items = items.filter(i => i.id !== id);
            saveItems(type, items);

            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) {
                el.classList.add('fade-out');
                setTimeout(() => {
                    renderAll(type);
                }, 300);
            } else {
                renderAll(type);
            }
            showToast('آیتم حذف شد.', 'fa-trash-alt');
        }

        function rateItem(type, id, rating) {
            let items = getItems(type);
            const idx = items.findIndex(i => i.id === id);
            if (idx !== -1) {
                items[idx].rating = rating;
                saveItems(type, items);
                renderAll(type);
            }
        }

        function copyText(title, desc) {
            const text = `${title}\n\n${desc}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('متن کپی شد! 📋', 'fa-copy');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
                showToast('متن کپی شد! 📋', 'fa-copy');
            });
        }

        // ===== Render =====
        function renderItem(type, item, container) {
            const el = document.createElement('div');
            el.className = 'note-card';
            el.setAttribute('data-id', item.id);
            el.setAttribute('data-title', item.title.toLowerCase());
            el.setAttribute('data-desc', item.desc.toLowerCase());
            el.setAttribute('data-tags', item.tags.join(' ').toLowerCase());

            let icon = 'fa-book';
            if (type === 'movies') icon = 'fa-film';
            if (type === 'theater') icon = 'fa-theater-masks';

            let stars = '';
            for (let i = 1; i <= 5; i++) {
                const active = i <= item.rating ? 'active' : '';
                stars += `<i class="fas fa-star star ${active}" onclick="rateItem('${type}', ${item.id}, ${i})"></i>`;
            }

            let tagsHtml = item.tags.map(tag =>
                `<span class="tag clickable" onclick="filterByTag('${type}', '${tag}')">#${tag}</span>`
            ).join('');

            el.innerHTML = `
                <div class="note-header">
                    <div class="note-title"><i class="fas ${icon}"></i> ${item.title}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="copyText('${item.title.replace(/'/g, "\\'")}', '${item.desc.replace(/'/g, "\\'")}')" title="کپی متن">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="action-btn delete" onclick="deleteItem('${type}', ${item.id})" title="حذف">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="note-desc">${item.desc}</div>
                ${tagsHtml ? `<div class="tags-container">${tagsHtml}</div>` : ''}
                <div class="note-meta">
                    <span><i class="far fa-clock"></i> ${item.date}</span>
                    <div class="rating-container">${stars}</div>
                </div>
            `;
            container.appendChild(el);
        }

        function renderAll(type) {
            const items = getItems(type);
            const container = document.getElementById(type + '-list');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-pen-nib"></i>
                        <p>هنوز چیزی اضافه نکردی...</p>
                        <p style="font-size:0.85rem;margin-top:4px;">اولین تجربه هنری‌ات را ثبت کن!</p>
                    </div>
                `;
            } else {
                items.forEach(i => renderItem(type, i, container));
            }

            updateStats(type);
            showPopularTags(type);
            applySearchFilter(type);
        }

        // ===== Stats =====
        function updateStats(type) {
            const items = getItems(type);
            const countSpan = document.getElementById(type + '-count');
            const avgSpan = document.getElementById(type + '-avg');

            if (countSpan) countSpan.innerText = items.length;

            if (avgSpan) {
                if (items.length === 0) {
                    avgSpan.innerText = '0';
                } else {
                    const totalRating = items.reduce((sum, item) => sum + item.rating, 0);
                    const avg = (totalRating / items.length).toFixed(1);
                    avgSpan.innerText = avg;
                }
            }
        }

        // ===== Popular Tags =====
        function showPopularTags(type) {
            const items = getItems(type);
            const tagCounts = {};

            items.forEach(item => {
                item.tags.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });

            const sortedTags = Object.entries(tagCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);

            const container = document.getElementById(type + '-tags-container');
            if (!container) return;

            container.innerHTML = '';
            if (sortedTags.length > 0) {
                const label = document.createElement('span');
                label.style.cssText = 'font-size:0.8rem; color:var(--text-secondary); margin-left:10px;';
                label.innerText = '🔥 پربازدیدترین‌ها:';
                container.appendChild(label);

                sortedTags.forEach(([tag, count]) => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'tag clickable';
                    tagEl.innerText = `#${tag} (${count})`;
                    tagEl.onclick = () => filterByTag(type, tag);
                    container.appendChild(tagEl);
                });
            }
        }

        // ===== Search & Filter =====
        function filterByTag(type, tag) {
            document.getElementById('search-input').value = tag;
            filterItems();
        }

        function filterItems() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const activeTab = getActiveTab();
            if (!activeTab) return;
            const container = document.getElementById(activeTab + '-list');
            const cards = container.querySelectorAll('.note-card');

            let visibleCount = 0;
            cards.forEach(card => {
                const title = card.getAttribute('data-title') || '';
                const desc = card.getAttribute('data-desc') || '';
                const tags = card.getAttribute('data-tags') || '';

                if (title.includes(query) || desc.includes(query) || tags.includes(query)) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Show/hide clear button
            clearSearchBtn.classList.toggle('visible', query.length > 0);

            // Update empty state if needed
            const emptyState = container.querySelector('.empty-state');
            if (visibleCount === 0 && cards.length > 0) {
                if (!emptyState) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.innerHTML = `<i class="fas fa-search"></i><p>نتیجه‌ای یافت نشد!</p>`;
                    container.appendChild(empty);
                }
            } else if (emptyState) {
                emptyState.remove();
            }
        }

        function applySearchFilter(type) {
            // Just re-run filter after render
            const query = document.getElementById('search-input').value;
            if (query) filterItems();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            clearSearchBtn.classList.remove('visible');
            filterItems();
        }

        function getActiveTab() {
            const activeBtn = document.querySelector('.tab-btn.active');
            if (!activeBtn) return 'books';
            const match = activeBtn.getAttribute('onclick').match(/'([^']+)'/);
            return match ? match[1] : 'books';
        }

        // ===== Switch Tab =====
        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabName + '-section').classList.add('active');
            document.querySelector(`.tab-btn[onclick="switchTab('${tabName}')"]`).classList.add('active');

            // Load drafts for this tab
            loadAutoSave();
            // Re-render
            renderAll(tabName);
            // Clear search
            document.getElementById('search-input').value = '';
            clearSearchBtn.classList.remove('visible');
            filterItems();
        }

        // ===== PDF Export =====
        function exportPDF() {
            const activeTab = getActiveTab();
            const container = document.getElementById(activeTab + '-list');
            const cards = container.querySelectorAll('.note-card:not([style*="display: none"])');

            const visibleCards = Array.from(cards).filter(c => c.style.display !== 'none');
            if (visibleCards.length === 0) {
                showToast('هیچ آیتمی برای خروجی PDF وجود ندارد!', 'fa-exclamation-triangle');
                return;
            }

            const pdfContent = document.getElementById('pdf-container');
            const tabNameMap = {
                'books': 'کتاب‌ها',
                'movies': 'فیلم‌ها',
                'theater': 'تئاترها'
            };

            pdfContent.innerHTML = `
                <div style="font-family: Tahoma, sans-serif; padding: 30px; color: #333; background: #fff; direction: rtl;">
                    <h1 style="color: #b8962e; text-align: center; border-bottom: 2px solid #b8962e; padding-bottom: 15px; margin-bottom: 20px;">
                        📚 کتاب باز - ${tabNameMap[activeTab] || activeTab}
                    </h1>
                    <div style="margin-top: 20px;">
                        ${visibleCards.map(card => `
                            <div style="border: 1px solid #e0e0e0; padding: 18px 20px; margin-bottom: 16px; border-radius: 10px; border-right: 4px solid #b8962e; background: #fafafa;">
                                <h3 style="margin: 0 0 10px 0; color: #222; font-size: 1.1rem;">
                                    ${card.querySelector('.note-title')?.innerText || 'بدون عنوان'}
                                </h3>
                                <p style="margin: 0; color: #555; line-height: 1.7; font-size: 0.95rem;">
                                    ${card.querySelector('.note-desc')?.innerText || ''}
                                </p>
                                <div style="margin-top: 8px; font-size: 0.85rem; color: #999;">
                                    ${card.querySelector('.note-meta')?.innerText || ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="text-align: center; color: #999; font-size: 0.8rem; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
                        تاریخ: ${new Date().toLocaleDateString('fa-IR')}
                    </div>
                </div>
            `;
            pdfContent.style.display = 'block';

            const opt = {
                margin: 1,
                filename: `کتاب-باز-${activeTab}-${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfContent).save().then(() => {
                pdfContent.style.display = 'none';
                pdfContent.innerHTML = '';
                showToast('PDF با موفقیت دانلود شد! 📄', 'fa-file-pdf');
            }).catch(() => {
                pdfContent.style.display = 'none';
                pdfContent.innerHTML = '';
                showToast('خطا در تولید PDF', 'fa-exclamation-triangle');
            });
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProfile();
            loadAutoSave();

            // Render all sections
            renderAll('books');
            renderAll('movies');
            renderAll('theater');

            // Show initial active tab
            const activeTab = getActiveTab();
            renderAll(activeTab);
        });

        // Close modal on overlay click
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeProfileModal();
        });

        // Close menu on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                dropdownMenu.classList.remove('active');
                closeProfileModal();
            }
        });
    </script>
</body>
</html>
